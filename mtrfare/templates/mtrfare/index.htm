<! DOCTYPE html >
<html lang ="en">
    <head>
        <meta charset ="utf-8">
        <meta name ="viewport" content ="width=device-width , initial-scale=1">
        <title> MTR Hong Kong Fare and Barrier Free Facilities </title>
        </head>
    <body>
        <h1> MTR Hong Kong fare and barrier free facilities search </h1>
        <p> Hello {{ username }} ! </p>
        <form method = "post" action = "{% url 'showfare' %}">
            {% csrf_token %}
            From :
            <select name = "Departing From" id = "source_station">
                {% for station in station_list %}
                    <option value = "{{ station.Station_ID }}"
                        {% if station.Station_ID == userPref.Pref_source_station_id %}
                            selected
                        {% endif %}
                    >
                    {{ station.English_Name }} 
                    </option>
                {% endfor %}
            </select>
            To :
            <select name = "Going To" id = "dest_station">
                {% for station in station_list %}
                    <option value = "{{ station.Station_ID }}"
                        {% if station.Station_ID == userPref.Pref_dest_station_id %}
                            selected
                        {% endif %}
                    >
                    {{ station.English_Name }}
                    </option>
                {% endfor %}
            </select>
            <button type ="submit"> Get fare </button>
        </form>
        <p> </p>
        <div> <p><a href = "logoff"> Logoff </a></p> </div>
        <div> <p><a href = "logon"> Logon </a></p> </div>
        {% if username != "Guest" %}
            <div> <p><a href = "account"> Account </a></p> </div>
        {% endif %}
        <div> <p><a href = "register"> Register </a></p> </div>
        {% if messages %}
            <div class="alert alert-primary" role="alert">
                {% for message in messages %}
                {{ message }}
                {% endfor %}
            </div>
        {% endif %}
    </body>
</html>
