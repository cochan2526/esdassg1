<! DOCTYPE html >
<html lang ="en">
    <head>
        <meta charset ="utf-8">
        <meta name ="viewport" content ="width=device-width , initial-scale=1">
        <title> MTR Hong Kong Fare </title>
        </head>
    <body>
        <h1> MTR Hong Kong fare search </h1>
        <p> Hello {{ username }} ! </p>
        <h2> Account page </h2>
        <form method = "post" action = "{% url 'preference' %}">
            {% csrf_token %}
            <select name = "Preference Source Station" id = "preference_source_station">
                {% for station in station_list %}
                    <option value = "{{ station.Station_ID }}"> {{ station.English_Name }} </option>
                {% endfor %}
            </select>
            <select name = "Preference Destionation Staion" id = "preference_dest_station">
                {% for station in station_list %}
                    <option value = "{{ station.Station_ID }}"> {{ station.English_Name }} </option>
                {% endfor %}
            </select>
            <button type ="submit"> Save </button>
        </form>
{% comment %}
        <form method ="post" action ="{% url 'logging_on' %}">
            {% csrf_token %}
            <p> username : <input name ="username" value ="{{ username }}"> </p>
            <p> password : <input type = "password" name ="password" value ="{{ password }}"> </p>
            <button type ="submit"> Login </button>
        </form>
        {% if messages %}
            <div class="alert alert-primary" role="alert">
                {% for message in messages %}
                {{ message }}
                {% endfor %}
            </div>
        {% endif %}
{% endcomment %}
    </body>
</html>
