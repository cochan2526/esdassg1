<! DOCTYPE html >
<html lang ="en">
    <head>
        <meta charset ="utf-8">
        <meta name ="viewport" content ="width=device-width , initial-scale=1">
        <title> MTR Hong Kong Fare and Barrier Free Facilities -- Register </title>
        {% load static %}
        <link rel="stylesheet" href="{% static 'mtrfare/style.css' %}">
    </head>
    <body>
        <div class = "banner" >
            <h1> MTR Hong Kong fare and barrier free facilities search </h1>
            <p> Hello {{ user_name }} ! </p>
        </div>
        <div class = "middle_container" >
            <form method ="post" action ="{% url 'registering' %}">
                {% csrf_token %}
                <p> username : <input name ="username" value ="{{ username }}"> </p>
                <p> password : <input type = "password" name ="password" value ="{{ password }}"> </p>
                <button type ="submit"> Register </button>
            </form>
        </div>
        <div> <a href = "{% url 'homepage' %}" > Home </a> </div>
        {% if messages %}
            <div class="alert alert-primary" role="alert">
                {% for message in messages %}
                {{ message }}
                {% endfor %}
            </div>
        {% endif %}
    </body>
</html>
